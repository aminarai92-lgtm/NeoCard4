<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Мои контакты — NeoCard</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
</head>
<body>
  <div class="loading-screen"><div class="spinner"></div></div>
  <header class="app-header"><div class="container"><a href="/pages/dashboard.html" class="logo"><span class="logo-icon">N</span> Контакты</a></div></header>
  <main class="page container">
    <div class="search-bar"><input class="input" id="search-input" placeholder="Поиск по имени..."></div>
    <div class="tabs">
      <button type="button" class="tab active" data-filter="all">Все</button>
      <button type="button" class="tab" data-filter="recent">Недавние</button>
    </div>
    <div class="cards-grid" id="contacts-list"></div>
  </main>
  <nav class="bottom-nav visible" id="bottom-nav">
    <ul>
      <li><a href="/pages/dashboard.html" data-nav="dashboard"><span class="nav-icon">🏠</span>Главная</a></li>
      <li><a href="/pages/my-cards.html" data-nav="cards"><span class="nav-icon">📇</span>Визитки</a></li>
      <li><a href="/pages/search.html" data-nav="search"><span class="nav-icon">🔍</span>Поиск</a></li>
      <li><a href="/pages/ai.html" data-nav="ai"><span class="nav-icon">🤖</span>AI</a></li>
      <li><a href="/pages/contacts.html" data-nav="contacts"><span class="nav-icon">👥</span>Контакты</a></li>
    </ul>
  </nav>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/app.js"></script>
  <script>
    let allCards = [];
    (async () => {
      await initAppShell("contacts");
      try {
        allCards = await api.get("/api/cards/saved");
        render(allCards);
      } catch (e) { NeoUI.toast(e.message, "error"); }
      document.getElementById("search-input").oninput = (e) => {
        const q = e.target.value.toLowerCase();
        render(allCards.filter(c => `${c.first_name} ${c.last_name}`.toLowerCase().includes(q) || (c.position || "").toLowerCase().includes(q)));
      };
    })();
    function render(cards) {
      const el = document.getElementById("contacts-list");
      if (!cards.length) { el.innerHTML = '<div class="empty-state glass-card">Нет сохранённых визиток</div>'; return; }
      el.innerHTML = cards.map(c => NeoUI.cardListItemHTML(c, `
        <div style="display:flex;gap:0.5rem;margin-top:1rem" onclick="event.stopPropagation()">
          <a href="/pages/card.html?slug=${c.slug}" class="btn btn-secondary btn-sm">Открыть</a>
          <button type="button" class="btn btn-danger btn-sm" data-unsave="${c.id}">Удалить</button>
        </div>`)).join("");
      el.querySelectorAll("[data-unsave]").forEach(btn => {
        btn.onclick = async () => {
          await api.delete(`/api/cards/${btn.dataset.unsave}/save`);
          allCards = allCards.filter(c => c.id != btn.dataset.unsave);
          render(allCards);
          NeoUI.toast("Удалено из контактов");
        };
      });
      el.querySelectorAll(".card-preview").forEach(card => {
        card.style.cursor = "pointer";
        card.onclick = (e) => { if (!e.target.closest("button")) location.href = `/pages/card.html?slug=${card.dataset.slug}`; };
      });
    }
  </script>
</body>
</html>
