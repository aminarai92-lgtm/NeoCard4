<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Поиск — NeoCard</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
</head>
<body>
  <div class="loading-screen"><div class="spinner"></div></div>
  <header class="app-header"><div class="container"><span class="logo"><span class="logo-icon">N</span> Поиск людей</span></div></header>
  <main class="page container">
    <div class="search-bar">
      <input class="input" id="search-q" placeholder="Имя, фамилия, должность, навыки..." autofocus>
    </div>
    <div class="cards-grid" id="results"></div>
  </main>
  <nav class="bottom-nav visible" id="bottom-nav">
    <ul>
      <li><a href="/pages/dashboard.html" data-nav="dashboard"><span class="nav-icon">🏠</span>Главная</a></li>
      <li><a href="/pages/my-cards.html" data-nav="cards"><span class="nav-icon">📇</span>Визитки</a></li>
      <li><a href="/pages/search.html" data-nav="search"><span class="nav-icon">🔍</span>Поиск</a></li>
      <li><a href="/pages/ai.html" data-nav="ai"><span class="nav-icon">🤖</span>AI</a></li>
      <li><a href="/pages/contacts.html" data-nav="contacts"><span class="nav-icon">👥</span>Контакты</a></li>
    </ul>
  </nav>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/app.js"></script>
  <script>
    let timer;
    (async () => {
      await initAppShell("search");
      const input = document.getElementById("search-q");
      const results = document.getElementById("results");
      input.oninput = () => {
        clearTimeout(timer);
        timer = setTimeout(async () => {
          const q = input.value.trim();
          if (q.length < 2) { results.innerHTML = ""; return; }
          try {
            const cards = await api.get(`/api/cards/search?q=${encodeURIComponent(q)}`);
            results.innerHTML = cards.length ? cards.map(c => {
              const item = { ...c, view_count: c.view_count || 0, is_published: true };
              return NeoUI.cardListItemHTML(item).replace(
                'class="glass-card card-preview"',
                `class="glass-card card-preview" onclick="location.href='/pages/card.html?slug=${c.slug}'"`
              );
            }).join("") : '<div class="empty-state glass-card">Ничего не найдено</div>';
          } catch (e) { NeoUI.toast(e.message, "error"); }
        }, 400);
      };
    })();
  </script>
</body>
</html>
