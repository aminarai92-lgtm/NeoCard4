<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e1a">
  <title>Главная — NeoCard</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
</head>
<body>
  <div class="loading-screen"><div class="spinner"></div></div>
  <header class="app-header" id="app-header">
    <div class="container">
      <a href="/pages/dashboard.html" class="logo"><span class="logo-icon">N</span> NeoCard</a>
      <div class="header-actions">
        <a href="/pages/admin.html" class="btn btn-ghost btn-sm" id="admin-link" style="display:none">Admin</a>
        <button type="button" class="btn btn-ghost btn-icon" id="user-menu-btn" title="Профиль">👤</button>
        <button type="button" class="btn btn-ghost btn-sm" id="btn-logout">Выход</button>
      </div>
    </div>
  </header>
  <main class="page container">
    <p class="dashboard-greeting" id="greeting">Загрузка...</p>
    <p class="dashboard-sub">Обзор ваших цифровых визиток</p>
    <div class="stats-grid" id="stats-grid"></div>
    <div class="quick-actions">
      <a href="/pages/editor.html" class="btn btn-primary">+ Создать визитку</a>
      <a href="/pages/ai.html" class="btn btn-secondary">AI Помощник</a>
    </div>
    <h2 class="section-title">Последние визитки <a href="/pages/my-cards.html" class="btn btn-ghost btn-sm">Все</a></h2>
    <div class="cards-grid" id="recent-cards"></div>
    <h2 class="section-title">Популярные визитки</h2>
    <div class="cards-grid" id="popular-cards"></div>
    <h2 class="section-title">AI Рекомендации</h2>
    <div class="glass-card ai-panel">
      <ul class="recommendations-list" id="ai-recs"></ul>
    </div>
  </main>
  <nav class="bottom-nav visible" id="bottom-nav">
    <ul>
      <li><a href="/pages/dashboard.html" data-nav="dashboard"><span class="nav-icon">🏠</span>Главная</a></li>
      <li><a href="/pages/my-cards.html" data-nav="cards"><span class="nav-icon">📇</span>Визитки</a></li>
      <li><a href="/pages/search.html" data-nav="search"><span class="nav-icon">🔍</span>Поиск</a></li>
      <li><a href="/pages/ai.html" data-nav="ai"><span class="nav-icon">🤖</span>AI</a></li>
      <li><a href="/pages/contacts.html" data-nav="contacts"><span class="nav-icon">👥</span>Контакты</a></li>
    </ul>
  </nav>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/app.js"></script>
  <script>
    (async () => {
      const user = await initAppShell("dashboard");
      if (!user) return;
      try {
        const d = await api.get("/api/cards/dashboard");
        document.getElementById("greeting").textContent = d.greeting;
        document.getElementById("stats-grid").innerHTML = `
          <div class="glass-card stat-card"><div class="value">${d.cards_count}</div><div class="label">Визиток</div></div>
          <div class="glass-card stat-card"><div class="value">${d.total_views}</div><div class="label">Просмотров</div></div>
          <div class="glass-card stat-card"><div class="value">${d.total_saves}</div><div class="label">Сохранений</div></div>
          <div class="glass-card stat-card"><div class="value">${d.total_qr_scans}</div><div class="label">QR сканов</div></div>`;
        const recentEl = document.getElementById("recent-cards");
        if (!d.recent_cards.length) {
          recentEl.innerHTML = '<div class="empty-state glass-card">Создайте первую визитку</div>';
        } else {
          recentEl.innerHTML = d.recent_cards.map(c => NeoUI.cardListItemHTML(c)).join("");
          recentEl.querySelectorAll(".card-preview").forEach(el => {
            el.onclick = () => location.href = `/pages/editor.html?id=${el.dataset.id}`;
          });
        }
        document.getElementById("popular-cards").innerHTML = d.popular_cards.length
          ? d.popular_cards.map(c => {
              const html = NeoUI.cardListItemHTML(c);
              return html.replace('class="glass-card card-preview"', `class="glass-card card-preview" onclick="location.href='/pages/card.html?slug=${c.slug}'"`);
            }).join("")
          : '<div class="empty-state glass-card">Пока нет публичных визиток</div>';
        document.getElementById("ai-recs").innerHTML = d.ai_recommendations.map(r => `<li>${NeoUI.escapeHtml(r)}</li>`).join("");
      } catch (e) {
        NeoUI.toast(e.message, "error");
      }
    })();
  </script>
</body>
</html>
