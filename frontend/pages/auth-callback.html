<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — NeoCard</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="loading-screen"><div class="spinner"></div></div>
  <p style="text-align:center;margin-top:40vh;color:#94a3b8">Завершаем вход...</p>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    (async () => {
      const params = NeoAuth._readAuthParams();
      const error = params.get("error") || new URLSearchParams(location.search).get("error");
      if (error) {
        NeoUI.hideLoading();
        alert(decodeURIComponent(error));
        location.replace("/index.html");
        return;
      }
      if (NeoAuth.handleCallback()) return;

      const code = new URLSearchParams(location.search).get("code");
      if (code) {
        try {
          const data = await api.post("/api/auth/google/token", { code });
          api.setTokens(data.access_token, data.refresh_token, data.user);
          location.replace("/pages/dashboard.html");
        } catch (e) {
          NeoUI.hideLoading();
          alert(e.message || "Ошибка входа");
          location.replace("/index.html");
        }
        return;
      }

      if (NeoAuth.isLoggedIn()) {
        location.replace("/pages/dashboard.html");
        return;
      }
      location.replace("/index.html");
    })();
  </script>
</body>
</html>
